interface:
  display_name: "Knowledge Ops"
  short_description: "Ingest, classify, and answer from the packaged knowledge base with citations"
  default_prompt: "When new files appear in inbox, process them first with scripts/process_inbox.py so they are classified, copied into the knowledge base, preprocessed into references/processed, and archived from inbox. For questions, start with scripts/retrieve.py over the processed cache, then verify against raw files only when needed. Format answers according to references/answer_schema.md, always citing file paths and locations. Do not hallucinate."
